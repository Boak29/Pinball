<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikPinball</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, iframe {
            width: 100%; height: 100%;
            border: none; overflow: hidden;
            background: #000;
        }
        iframe { position: fixed; top: 0; left: 0; }
        #toast {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff; padding: 8px 16px; border-radius: 8px;
            font-family: Arial, sans-serif; font-size: 12px;
            z-index: 9999; display: none;
            max-width: 90%; text-align: center;
        }
    </style>
</head>
<body>
    <div id="toast"></div>
    <iframe id="gameFrame" allow="autoplay *; fullscreen *"></iframe>
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var url = params.get('url');

            if (!url) {
                showToast('No game URL specified. Go back and try again.', '#ff4444');
                return;
            }

            var iframe = document.getElementById('gameFrame');

            function resize() {
                iframe.style.width = window.innerWidth + 'px';
                iframe.style.height = window.innerHeight + 'px';
            }

            window.addEventListener('resize', resize);
            resize();

            iframe.src = url;

            // Handle iframe load error
            iframe.onerror = function() {
                showToast('Failed to load game. Check your connection.', '#ff4444');
            };

            // Keyboard volume control
            if (window.KeyEvent) {
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'VolumeUp' || e.key === 'VolumeDown') {
                        e.preventDefault();
                    }
                });
            }

            function showToast(msg, color) {
                var el = document.getElementById('toast');
                el.textContent = msg;
                el.style.display = 'block';
                if (color) el.style.backgroundColor = color;
                setTimeout(function() { el.style.display = 'none'; }, 4000);
            }

            // Back button handler
            document.addEventListener('backbutton', function(e) {
                e.preventDefault();
                if (confirm('Exit TikPinball?')) {
                    navigator.app && navigator.app.exitApp();
                }
            }, false);
        })();
    </script>
</body>
</html>
