name: Build APK

on:
  push:
    branches: ["main"]
    paths:
      - 'tikpinball-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tikpinball-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gradle 8.10
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.10-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.10/bin" >> $GITHUB_PATH

      - name: Install Cordova
        run: npm install -g cordova

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: cordova platform add android --nofetch

      - name: Force Gradle 8.10 in wrapper
        run: |
          mkdir -p platforms/android/gradle/wrapper
          cat > platforms/android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.10-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Build APK
        run: cordova build android --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TikPinball-APK
          path: tikpinball-app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
          compression-level: 0
          if-no-files-found: warn

      - name: Upload debug APK as fallback
        uses: actions/upload-artifact@v4
        with:
          name: TikPinball-APK-debug
          path: tikpinball-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          compression-level: 0
          if-no-files-found: warn
